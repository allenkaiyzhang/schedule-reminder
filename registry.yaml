service:
  name: schedule-reminder
  host: 127.0.0.1
  port: 8030
  health_path: /health

runtime:
  python: python3
  venv_dir: .venv

paths:
  data_dir: data
  log_dir: logs
  sqlite_path: data/reminders.db
  log_file: logs/schedule-reminder.log

telegram:
  enable_bot: true
  disable_send: false
  parse_mode: HTML
  command_timeout_seconds: 10

backend:
  mode: fallback
  timeout_seconds: 5
  interaction_path: /api/interactions/telegram
  health_path: /health
  show_mock_banner: true

mock:
  enabled: true
  allow_demo_actions: true
  banner: "MOCK MODE - ops-core business actions are unavailable"

scheduler:
  timezone: Asia/Shanghai
  max_instances: 1
  coalesce: true

deploy:
  install_path: /opt/schedule-reminder
  systemd_service: schedule-reminder
